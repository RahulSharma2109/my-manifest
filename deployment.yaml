apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: sharmaxrahul/myapp:811d9b50c39440894890ec906a008712d45d37b2
        ports:
        - containerPort: 5000
